name: Dev Pipeline

on:
  push:
    branches:
      - dev

permissions:
  id-token: write
  contents: write

jobs:

  # ─── DETECT CHANGES ─────────────────────────────────────────────────────────
  detect-changes:
    name: Detect Changed Paths
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      database: ${{ steps.filter.outputs.database }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend-services/**'
            frontend:
              - 'frontend-services/**'
            database:
              - 'migrations/dev/**'

  # ─── BACKEND ────────────────────────────────────────────────────────────────
  build-backend:
    name: Build & Deploy Backend (dev)
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::758024567313:role/github-oidc-role
          aws-region: ap-south-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push backend image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: backend-api-dev
          IMAGE_TAG: ${{ github.sha }}
        run: |
          cd backend-services/users-api
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker tag  $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
                      $ECR_REGISTRY/$ECR_REPOSITORY:dev-latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:dev-latest

      - name: Update image tag in values-dev.yaml
        run: |
          sed -i "s/tag: .*/tag: ${{ github.sha }}/" \
            backend-services/users-api/backend-api/values-dev.yaml
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add backend-services/users-api/backend-api/values-dev.yaml
          git commit -m "chore: update dev image tag to ${{ github.sha }}" || echo "No changes"
          git push

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name demo-eks --region ap-south-1

      - name: Apply ArgoCD dev app
        run: kubectl apply -f argocd/backend-dev.yaml

      - name: Install ArgoCD CLI
        run: |
          sudo curl -sSL -o /usr/local/bin/argocd \
            https://github.com/argoproj/argo-cd/releases/download/v2.14.7/argocd-linux-amd64
          sudo chmod +x /usr/local/bin/argocd

      - name: Sync ArgoCD dev app
        run: |
          argocd login ${{ secrets.ARGOCD_SERVER }} \
            --username ${{ secrets.ARGOCD_USERNAME }} \
            --password ${{ secrets.ARGOCD_PASSWORD }} \
            --insecure --grpc-web
          argocd app terminate-op backend-api-dev --grpc-web 2>/dev/null || true
          sleep 3
          argocd app sync backend-api-dev --grpc-web --force
          argocd app wait backend-api-dev --sync --health --timeout 120 --grpc-web

  # ─── FRONTEND ───────────────────────────────────────────────────────────────
  build-frontend:
    name: Build & Deploy Frontend (dev)
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend-services/frontend-apps/web-ui/package-lock.json

      - name: Install & build
        run: |
          cd frontend-services/frontend-apps/web-ui
          npm ci
          npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::758024567313:role/github-oidc-role
          aws-region: ap-south-1

      - name: Deploy to S3 /dev path
        run: |
          aws s3 sync frontend-services/frontend-apps/web-ui/build/ \
            s3://${{ secrets.S3_BUCKET_NAME }}/dev/ --delete

      - name: Invalidate CloudFront /dev/*
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/dev/*"

  # ─── DATABASE ───────────────────────────────────────────────────────────────
  database-migration:
    name: Database Migration (dev)
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.database == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::758024567313:role/github-oidc-role
          aws-region: ap-south-1

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name demo-eks --region ap-south-1

      - name: Apply secret and configmap
        run: |
          kubectl create namespace dev --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret generic rds-secret -n dev \
            --from-literal=DB_HOST=${{ secrets.DEV_DB_HOST }} \
            --from-literal=DB_NAME=${{ secrets.DEV_DB_NAME }} \
            --from-literal=DB_USER=${{ secrets.DEV_DB_USER }} \
            --from-literal=DB_PASSWORD=${{ secrets.DEV_DB_PASSWORD }} \
            --dry-run=client -o yaml | kubectl apply -f -
          kubectl apply -f migrations/dev/configmap.yaml

      - name: Run migration
        run: |
          kubectl delete job mysql-migration -n dev --ignore-not-found=true
          kubectl apply -f migrations/dev/migration-job.yaml
          kubectl wait --for=condition=complete job/mysql-migration -n dev --timeout=300s

      - name: Print migration logs
        run: kubectl logs job/mysql-migration -n dev
