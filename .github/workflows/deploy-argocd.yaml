name: Deploy via ArgoCD

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy-dev:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        role-to-assume: arn:aws:iam::758024567313:role/github-oidc-role
        aws-region: ap-south-1
    
    - name: Update kubeconfig
      run: |
        aws eks update-kubeconfig --name demo-eks --region ap-south-1

    - name: Debug runner
      run: |
        pwd
        whoami
        df -h
        ls -la

    - name: Install ArgoCD CLI
      run: |
        sudo curl -sSL -o /usr/local/bin/argocd \
        https://github.com/argoproj/argo-cd/releases/download/v2.14.7/argocd-linux-amd64

        sudo chmod +x /usr/local/bin/argocd

        argocd version --client
        
    - name: Login to ArgoCD
      run: |
        argocd login ${{ secrets.ARGOCD_SERVER }} \
        --username ${{ secrets.ARGOCD_USERNAME }} \
        --password ${{ secrets.ARGOCD_PASSWORD }} \
        --insecure \
        --grpc-web

    - name: Sync Application
      run: |
        argocd app sync backend-api-dev --grpc-web
        argocd app wait backend-api-dev --sync --grpc-web
  
  deploy-migrations:
    runs-on: ubuntu-latest
    needs: deploy-dev
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        role-to-assume: arn:aws:iam::758024567313:role/github-oidc-role
        aws-region: ap-south-1
    
    - name: Update kubeconfig
      run: |
        aws eks update-kubeconfig --name demo-eks --region ap-south-1
    
    - name: Apply dev secret and configmap
      run: |
        kubectl create namespace dev --dry-run=client -o yaml | kubectl apply -f -
        kubectl create secret generic rds-secret -n dev \
          --from-literal=DB_HOST=${{ secrets.DEV_DB_HOST }} \
          --from-literal=DB_NAME=${{ secrets.DEV_DB_NAME }} \
          --from-literal=DB_USER=${{ secrets.DEV_DB_USER }} \
          --from-literal=DB_PASSWORD=${{ secrets.DEV_DB_PASSWORD }} \
          --dry-run=client -o yaml | kubectl apply -f -
        kubectl apply -f migrations/dev/configmap.yaml

    - name: Run dev migration job
      run: |
        kubectl delete job mysql-migration -n dev --ignore-not-found=true
        kubectl apply -f migrations/dev/migration-job.yaml
        kubectl wait --for=condition=complete job/mysql-migration -n dev --timeout=300s

    - name: Apply prod secret and configmap
      run: |
        kubectl create namespace prod --dry-run=client -o yaml | kubectl apply -f -
        kubectl create secret generic rds-secret -n prod \
          --from-literal=DB_HOST=${{ secrets.PROD_DB_HOST }} \
          --from-literal=DB_NAME=${{ secrets.PROD_DB_NAME }} \
          --from-literal=DB_USER=${{ secrets.PROD_DB_USER }} \
          --from-literal=DB_PASSWORD=${{ secrets.PROD_DB_PASSWORD }} \
          --dry-run=client -o yaml | kubectl apply -f -
        kubectl apply -f migrations/prod/configmap.yaml

    - name: Run prod migration job
      run: |
        kubectl delete job mysql-migration -n prod --ignore-not-found=true
        kubectl apply -f migrations/prod/migration-job.yaml
        kubectl wait --for=condition=complete job/mysql-migration -n prod --timeout=300s
