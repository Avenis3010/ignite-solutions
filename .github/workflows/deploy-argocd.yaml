name: Deploy via ArgoCD

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy-dev:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ap-south-1
    
    - name: Update kubeconfig
      run: |
        aws eks update-kubeconfig --name demo-eks --region ap-south-1

    - name: Debug runner
      run: |
        pwd
        whoami
        df -h
        ls -la

    - name: Install ArgoCD CLI
      run: |
        sudo curl -sSL -o /usr/local/bin/argocd \
        https://github.com/argoproj/argo-cd/releases/download/v2.14.7/argocd-linux-amd64

        sudo chmod +x /usr/local/bin/argocd

        argocd version --client
        
    - name: Login to ArgoCD
      run: |
        argocd login ${{ secrets.ARGOCD_SERVER }} \
        --username ${{ secrets.ARGOCD_USERNAME }} \
        --password ${{ secrets.ARGOCD_PASSWORD }} \
        --insecure \
        --grpc-web

    - name: Sync Application
      run: |
        argocd app sync backend-api-dev --grpc-web
        argocd app wait backend-api-dev --sync --grpc-web
  
  deploy-migrations:
    runs-on: ubuntu-latest
    needs: deploy-dev
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ap-south-1
    
    - name: Update kubeconfig
      run: |
        aws eks update-kubeconfig --name demo-eks --region ap-south-1
    
    - name: Apply dev migrations
      run: |
        kubectl apply -f migrations/dev/secret.yaml
        kubectl apply -f migrations/dev/configmap.yaml
        kubectl apply -f migrations/dev/migration-job.yaml
        kubectl wait --for=condition=complete job/mysql-migration -n dev --timeout=300s
    
    - name: Create prod namespace
      run: |
        kubectl create namespace prod || true
    
    - name: Apply prod migrations
      run: |
        kubectl apply -f migrations/prod/secret.yaml
        kubectl apply -f migrations/prod/configmap.yaml
        kubectl apply -f migrations/prod/migration-job.yaml
        kubectl wait --for=condition=complete job/mysql-migration -n prod --timeout=300s
