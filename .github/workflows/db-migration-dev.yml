name: Database Migration Dev

on:
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install MySQL Client
      run: |
        sudo apt-get update
        sudo apt-get install mysql-client -y

    - name: Test Database Connectivity
      run: |
       echo "Testing connection to $DB_HOST"
       timeout 10 bash -c "</dev/tcp/$DB_HOST/3306" && echo "Port 3306 reachable" || echo "Port 3306 NOT reachable"
     env:
       DB_HOST: ${{ secrets.DB_HOST }}

    - name: Verify DB Host
      run: |
        echo "DB_HOST=$DB_HOST"
        nslookup $DB_HOST
      env:
         DB_HOST: ${{ secrets.DB_HOST }}

    - name: Run Migration
      env:
        DB_HOST: ${{ secrets.DEV_DB_HOST }}
        DB_NAME: ${{ secrets.DEV_DB_NAME }}
        DB_USER: ${{ secrets.DEV_DB_USER }}
        DB_PASSWORD: ${{ secrets.DEV_DB_PASSWORD }}

      run: |
        mysql \
        -h $DB_HOST \
        -u $DB_USER \
        -p$DB_PASSWORD \
        $DB_NAME \
        < migrations/dev/001_create_users.sql
