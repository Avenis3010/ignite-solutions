name: Integration Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: '0 2 * * *'  # Run daily at 2 AM UTC

permissions:
  id-token: write
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        role-to-assume: arn:aws:iam::758024567313:role/github-oidc-role
        aws-region: ap-south-1
    
    - name: Update kubeconfig
      run: |
        aws eks update-kubeconfig --name demo-eks --region ap-south-1
    
    - name: Check Backend API Health
      run: |
        kubectl run -it --rm health-check --image=curlimages/curl --restart=Never -- \
        curl -f http://backend-api:5000/health || exit 1
    
    - name: Check Database Connection
      run: |
        kubectl run -it --rm db-check --image=mysql:8 --restart=Never -- \
        mysql -h platform-mysql-new.cvi2swcoup2y.ap-south-1.rds.amazonaws.com \
        -u admin -p${{ secrets.DB_PASSWORD }} \
        -e "USE platform; SELECT COUNT(*) FROM users;" || exit 1
    
    - name: Test Frontend S3 Deployment
      run: |
        aws s3 ls s3://${{ secrets.S3_BUCKET_NAME }}/web-ui/ || exit 1
        aws cloudfront get-distribution --id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} || exit 1
