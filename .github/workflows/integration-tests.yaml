name: Integration Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: '0 2 * * *'

permissions:
  id-token: write
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: arn:aws:iam::758024567313:role/github-oidc-role
        aws-region: ap-south-1

    - name: Update kubeconfig
      run: aws eks update-kubeconfig --name demo-eks --region ap-south-1

    - name: Check Backend API Health
      run: |
        kubectl run health-check --image=curlimages/curl --restart=Never \
          --command -- curl -f http://backend-api:5000/health
        kubectl wait --for=condition=complete pod/health-check --timeout=60s
        kubectl logs health-check
        kubectl delete pod health-check --ignore-not-found=true

    - name: Check Database Connection
      run: |
        kubectl run db-check -n dev --image=mysql:8 --restart=Never \
          --env="MYSQL_PWD=${{ secrets.DEV_DB_PASSWORD }}" \
          --command -- mysql \
            -h platform-mysql-new.cvi2swcoup2y.ap-south-1.rds.amazonaws.com \
            -u admin \
            -e "USE platform; SELECT COUNT(*) FROM users;"
        kubectl wait --for=condition=complete pod/db-check -n dev --timeout=60s
        kubectl logs db-check -n dev
        kubectl delete pod db-check -n dev --ignore-not-found=true

    - name: Test Frontend S3 Deployment
      run: |
        aws s3 ls s3://${{ secrets.S3_BUCKET_NAME }}/web-ui/ || exit 1
        aws cloudfront get-distribution --id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} || exit 1
