name: Build & Deploy Frontend

on:
  push:
    branches:
      - main
    paths:
      - 'frontend-services/**'
      - '.github/workflows/build-frontend.yaml'
  pull_request:
    branches:
      - main
    paths:
      - 'frontend-services/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: 'frontend-services/frontend-apps/web-ui/package-lock.json'
    
    - name: Install dependencies
      run: |
        cd frontend-services/frontend-apps/web-ui
        npm ci
    
    - name: Run tests
      run: |
        cd frontend-services/frontend-apps/web-ui
        npm test -- --coverage --watchAll=false || true
    
    - name: Build
      run: |
        cd frontend-services/frontend-apps/web-ui
        npm run build
    - name: Debug secrets
      run: | 
        echo "KEY LENGTH: ${#AWS_ACCESS_KEY_ID}"
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
    
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ap-south-1
    
    - name: Deploy to S3
      env:
        BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
      run: |
        cd frontend-services/frontend-apps/web-ui
        echo "Bucket=[$BUCKET_NAME]"
        aws s3 sync build/ "s3://$BUCKET_NAME/web-ui/" --delete
    
    - name: Invalidate CloudFront cache
      if: github.event_name == 'push'
      run: |
        aws cloudfront create-invalidation --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} --paths "/*"
